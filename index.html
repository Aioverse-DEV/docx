---
layout: default
title: Home
---

<div class="home">
    <h1>Welcome to {{ site.title }}</h1>
    <p>{{ site.description }}</p>
    
    <h2>Recent Posts</h2>
    
    <ul class="post-list">
        {% for post in site.posts %}
        <li>
            <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
            <h3>
                <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            </h3>
            <p>{{ post.excerpt }}</p>
        </li>
        {% endfor %}
    </ul>
</div>
